<div class="login-container">
  <div class="login-card">
    <h2>Iniciar Sesión</h2>
    <p>Bienvenido al Gestor de Tareas</p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      
      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input 
          id="email" 
          type="email" 
          formControlName="email" 
          placeholder="tu@correo.com"
          [class.is-invalid]="emailControl?.invalid && emailControl?.touched"
        >
        <div class="error-message" *ngIf="emailControl?.invalid && emailControl?.touched">
          <small *ngIf="emailControl?.errors?.['required']">El correo es obligatorio.</small>
          <small *ngIf="emailControl?.errors?.['email']">Ingresa un correo válido.</small>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input 
          id="password" 
          type="password" 
          formControlName="password" 
          placeholder="******"
          [class.is-invalid]="passwordControl?.invalid && passwordControl?.touched"
        >
        <div class="error-message" *ngIf="passwordControl?.invalid && passwordControl?.touched">
          <small *ngIf="passwordControl?.errors?.['required']">La contraseña es obligatoria.</small>
          <small *ngIf="passwordControl?.errors?.['minlength']">Mínimo 6 caracteres.</small>
        </div>
      </div>

      <div class="error-message global-error" *ngIf="errorMessage">
        <small>{{ errorMessage }}</small>
      </div>

      <button type="submit" [disabled]="isLoading">
        {{ isLoading ? 'Ingresando...' : 'Entrar' }}
      </button>

    </form>
  </div>
</div>
